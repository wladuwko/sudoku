    <style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px; /* Отступы по краям экрана */
    box-sizing: border-box;
    background-color: #121212; /* Темный фон */
    color: #ffffff; /* Светлый текст */
}

h1 {
    margin-top: 20px;
    color: #ffffff; /* Светлый текст */
}

.difficulty-buttons-container {
    background-color: #1e1e1e; /* Темный фон */
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 20px;
}

.difficulty-buttons {
    display: flex;
    gap: 10px;
}

.difficulty-buttons button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #333; /* Темный фон кнопки */
    color: #ffffff; /* Светлый текст кнопки */
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.difficulty-buttons button:hover {
    background-color: #444; /* Темнее при наведении */
}

#sudokuBoard {
    display: none; /* Скрыть по умолчанию */
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px; /* Увеличенное расстояние между квадратами 3x3 */
    width: 450px; /* Фиксированная ширина */
    height: 450px; /* Фиксированная высота */
    margin: 20px auto;
    background-color: #1e1e1e; /* Темный фон доски */
    padding: 10px;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); /* Светлая тень */
}

.sudoku-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px; /* Увеличенное расстояние между клетками внутри квадрата */
    padding: 2px; /* Внутренний отступ для клеток */
    border: none; /* Убираем обводку всего дива */
}

.sudoku-cell {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%; /* Фиксированная высота */
    position: relative;
    border: 1px solid #444; /* Темная граница клеток */
    font-size: 18px;
    font-weight: bold;
    background-color: #333; /* Темный фон клеток */
    cursor: pointer;
}

.sudoku-cell.selected {
    border: 2px solid #ffffff; /* Светлая граница для выбранной клетки */
    box-sizing: border-box; /* Убедимся, что граница не увеличивает размер клетки */
}

.sudoku-cell span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffffff; /* Светлый текст */
}

.sudoku-cell.selected {
    border: 2px solid #ffffff; /* Светлая граница для выбранной клетки */
    box-sizing: border-box; /* Убедимся, что граница не увеличивает размер клетки */
    position: relative; /* Для позиционирования псевдоэлементов */
}

.sudoku-cell.highlighted {
    background-color: #444; /* Более темный фон для выделенных клеток */
}

.sudoku-cell span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffffff; /* Светлый текст */
}

.input-buttons-container {
    background-color: #1e1e1e; /* Темный фон */
    padding: 10px;
    border-radius: 5px;
    margin-top: 20px;
}

.input-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* Две строки по 5 кнопок */
    gap: 5px;
}

.input-buttons button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #333; /* Темный фон кнопки */
    color: #ffffff; /* Светлый текст кнопки */
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.input-buttons button:hover {
    background-color: #444; /* Темнее при наведении */
}

    </style>
</head>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const sudokuBoardElement = document.getElementById('sudokuBoard');
    const inputButtonsElement = document.getElementById('inputButtons');
    let selectedCell = null; // Объявляем selectedCell в правильной области видимости

    sudokuBoardElement.style.display = 'none'; // Убедимся, что доска скрыта при загрузке страницы

    const buttons = {
        easy: document.getElementById('easyButton'),
        medium: document.getElementById('mediumButton'),
        hard: document.getElementById('hardButton')
    };

    const difficulties = {
        easy: 0,
        medium: 40,
        hard: 50
    };

    Object.keys(buttons).forEach(difficulty => {
        buttons[difficulty].addEventListener('click', function() {
            const emptyCells = difficulties[difficulty];
            fetch(`generate-sudoku?emptyCells=${emptyCells}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    displaySudoku(data);
                    deselectCell(); // Снять выбор с клетки при генерации
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        });
    });

    function displaySudoku(board) {
        const cells = document.querySelectorAll('.sudoku-cell');
        cells.forEach((cell, index) => {
            const row = Math.floor(index / 9);
            const col = index % 9;
            const value = board[row][col];
            cell.querySelector('span').textContent = value === 0 ? '' : value;
        });

        sudokuBoardElement.style.display = 'grid'; // Отобразить доску
    }

    function setSudokuBoardSize() {
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const boardSize = Math.min(viewportWidth, viewportHeight) * 0.8; // 80% от минимальной стороны экрана
        sudokuBoardElement.style.width = `${boardSize}px`;
        sudokuBoardElement.style.height = `${boardSize}px`;
    }

    setSudokuBoardSize(); // Установить размер доски при загрузке страницы

    document.querySelectorAll('.sudoku-cell').forEach(cell => {
        cell.addEventListener('click', function() {
            if (selectedCell) {
                selectedCell.classList.remove('selected');
                removeHighlighting();
            }
            selectedCell = cell;
            selectedCell.classList.add('selected');
            highlightRowAndColumn(cell);
            inputButtonsElement.style.display = 'grid';
        });
    });

    inputButtonsElement.addEventListener('click', function(event) {
    if (event.target.tagName === 'BUTTON') {
        const number = event.target.textContent;
        if (selectedCell) {
            selectedCell.querySelector('span').textContent = number;
            inputButtonsElement.style.display = 'none';
            selectedCell.classList.remove('selected');
            removeHighlighting(); // Убираем подсветку
            selectedCell = null;
        }
    }
});

    window.addEventListener('resize', setSudokuBoardSize); // Обновить размер доски при изменении размера окна

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            deselectCell();
        }
    });

    function deselectCell() {
        if (selectedCell) {
            selectedCell.classList.remove('selected');
            removeHighlighting();
            selectedCell = null;
            inputButtonsElement.style.display = 'none';
        }
    }

 function highlightRowAndColumn(cell) {
    const cells = document.querySelectorAll('.sudoku-cell');
    const cellIndex = Array.from(cells).indexOf(cell);

    // Вычисляем номер секции и ячейки внутри секции
    const sectionIndex = Math.floor(cellIndex / 9);
    const cellInSectionIndex = cellIndex % 9;

    // Вычисляем координаты ячейки в сетке 9x9
    const row = Math.floor(sectionIndex / 3) * 3 + Math.floor(cellInSectionIndex / 3);
    const col = (sectionIndex % 3) * 3 + (cellInSectionIndex % 3);

    // Подсвечиваем строку и столбец
    for (let i = 0; i < 9; i++) {
      // Подсвечиваем ячейки в строке
      const rowIndex = Math.floor(row / 3) * 3 + Math.floor(i / 3);
      const colIndex = (row % 3) * 3 + (i % 3);
      const index = rowIndex * 9 + colIndex;
      cells[index].classList.add('highlighted');
    }

    for (let i = 0; i < 9; i++) {
      // Подсвечиваем ячейки в столбце
      const rowIndex = Math.floor(i / 3) * 3 + Math.floor(col / 3);
      const colIndex = (i % 3) * 3 + (col % 3);
      const index = rowIndex * 9 + colIndex;
      cells[index].classList.add('highlighted');
    }
  }

    function removeHighlighting() {
        const cells = document.querySelectorAll('.sudoku-cell');
        cells.forEach(cell => {
            cell.classList.remove('highlighted');
        });
    }
});

        let tg = window.Telegram.WebApp;

        // Получение данных из Telegram Web App
        let initData = tg.initData;

        console.log("Отправляемые данные: " + initData);


        fetch('/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ initData: initData })
        })
        .then(response => response.json())
        .then(data => {
            if (data.valid) {
                console.log('Данные проверены успешно');
            } else {
                console.log('Ошибка проверки данных');
            }
        })
        .catch(error => console.error('Ошибка:', error));



</script>
